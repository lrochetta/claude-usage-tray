name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'tag to release (e.g. v0.1.0)'
        required: true

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: .exe
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: ''
          - os: macos-latest
            target: x86_64-apple-darwin
            ext: ''
          - os: macos-latest
            target: aarch64-apple-darwin
            ext: ''
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Linux system deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxdo-dev libgtk-3-dev libayatana-appindicator3-dev

      - name: Build release binary
        run: cargo build --release --bin claude-usage-tray --target ${{ matrix.target }}

      - name: Rename binary
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [ -z "$VERSION" ] || [ "$VERSION" = "$GITHUB_REF_NAME" ]; then
            VERSION="${{ inputs.tag }}"
            VERSION="${VERSION#v}"
          fi
          SRC="target/${{ matrix.target }}/release/claude-usage-tray${{ matrix.ext }}"
          DEST="claude-usage-tray-${VERSION}-${{ matrix.target }}${{ matrix.ext }}"
          cp "$SRC" "$DEST"
          ls -la "$DEST"

      - uses: actions/upload-artifact@v4
        with:
          name: bin-${{ matrix.target }}
          path: claude-usage-tray-*
          if-no-files-found: error

  release:
    name: gh release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten
        run: |
          mkdir -p release
          find artifacts -type f -name 'claude-usage-tray-*' -exec cp {} release/ \;
          ls -la release

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true

  npm-publish:
    name: npm publish
    runs-on: ubuntu-latest
    needs: release
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - name: Sync version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          node scripts/sync-versions.mjs "$VERSION"

      - name: Copy LICENSE and README to npm/
        run: |
          cp LICENSE npm/LICENSE
          cp README.md npm/README.md

      - name: Publish to npm
        working-directory: npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
